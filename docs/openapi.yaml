openapi: 3.0.3
info:
  title: LearnVault API
  version: 1.0.0
  description: Backend API for LearnVault frontend and integrations.
servers:
  - url: http://localhost:4000
    description: Local development server
tags:
  - name: Health
    description: Server status endpoints
  - name: Courses
    description: Course catalog endpoints
  - name: Validator
    description: Milestone validation endpoints
  - name: Events
    description: Event stream endpoints
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Check server health status
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/courses:
    get:
      tags: [Courses]
      summary: List published courses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Courses fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/courses/{courseId}:
    get:
      tags: [Courses]
      summary: Get a course by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
          description: Unique course identifier
      responses:
        "200":
          description: Course fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/validator/validate:
    post:
      tags: [Validator]
      summary: Validate a learner milestone
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidatorRequest"
      responses:
        "200":
          description: Milestone validation successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ValidatorResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/events:
    get:
      tags: [Events]
      summary: List platform events
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: Optional event type filter
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Max number of events to return
      responses:
        "200":
          description: Events fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
      required: [status, timestamp]
    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        level:
          type: string
        published:
          type: boolean
      required: [id, title, level, published]
    Event:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        entityId:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [id, type, entityId, timestamp]
    ValidatorRequest:
      type: object
      properties:
        courseId:
          type: string
        learnerAddress:
          type: string
        milestoneId:
          type: integer
          minimum: 0
      required: [courseId, learnerAddress, milestoneId]
    ValidatorResult:
      allOf:
        - $ref: "#/components/schemas/ValidatorRequest"
        - type: object
          properties:
            approved:
              type: boolean
            validator:
              type: string
          required: [approved, validator]
  responses:
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
